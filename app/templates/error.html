<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Error {{ codigo }} - SADES</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fc; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .error-card { text-align: center; padding: 3rem; max-width: 500px; }
        .error-code { font-size: 6rem; font-weight: 800; color: #1a365d; line-height: 1; }
        .error-message { font-size: 1.25rem; color: #4a5568; margin: 1rem 0 2rem; }
        .btn-primary { background: #1a365d; border: none; padding: 0.75rem 2rem; border-radius: 8px; }
        .btn-primary:hover { background: #2a4a7f; }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code">{{ codigo }}</div>
        <div class="error-message">{{ mensaje }}</div>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Volver al inicio
        </a>
    </div>
</body>
</html>
